# Example: framework-managed app release with required GitHub Release assets.
#
# Use this when CI/deploy has already created or uploaded assets and the shared
# finalizer should verify they are visible before downstream notification.
api_version: 1
product_name: Example Web App
release_profile: asset-release
release_mode: framework-managed
provider_plugin: builtin:github-actions
profile_plugin: builtin:asset-release
tool_plugin: null

artifact_publishers:
  - plugin: builtin:github-release-assets

notifiers:
  - plugin: builtin:slack-webhook

metadata_enrichers:
  - plugin: builtin:github-release-body-pr-parser

plugin_allowlist: []
allow_local_plugins: false
stable_branches:
  - main

version_source:
  type: date-sha

tag_template: release-{version}

notes_source:
  type: associated-release-pr

assets:
  required_assets:
    - web-app.zip
    - checksums.txt

slack:
  enabled: true
  webhook_secret: SLACK_WEBHOOK_URL

plugin_config:
  builtin:slack-webhook:
    include_rollout_prompt: true
