name: Publish
on:
  push:
    tags: ['v*']
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm config set //registry.npmjs.org/:_authToken $NPM_TOKEN && npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: node dist/cli/main.js finalize --config .github/relay.yml --provider builtin:github-actions --tag "${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
