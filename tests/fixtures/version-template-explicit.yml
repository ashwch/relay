api_version: 1
product_name: Example Library
release_profile: deploy-release
release_mode: framework-managed
provider_plugin: builtin:generic-env
profile_plugin: builtin:deploy-release
tool_plugin: null
artifact_publishers: []
notifiers: []
metadata_enrichers: []
plugin_allowlist: []
allow_local_plugins: false
stable_branches:
  - main
version_source:
  type: template
  template: '{date}.{counter}-{short_sha}'
  counter_source: explicit
  counter: 4
tag_template: release-{version}
notes_source:
  type: static
plugin_config: {}
