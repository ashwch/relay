# npm package release fixture.
#
# First-principles rule:
# verify the package is visible before creating the GitHub Release.
# That prevents a failed package publish from leaving behind a release record
# that announces something users cannot install yet.
api_version: 1
product_name: Example Component Library
release_profile: npm-package
release_mode: framework-managed
provider_plugin: builtin:generic-env
profile_plugin: builtin:npm-package
tool_plugin: null
artifact_publishers:
  - plugin: builtin:npm-registry-verify
notifiers: []
metadata_enrichers: []
plugin_allowlist: []
allow_local_plugins: false
stable_branches:
  - main
version_source:
  type: date-sha
tag_template: v{version}
notes_source:
  type: associated-release-pr
package:
  name: '@example/component-library'
  registry_url: https://registry.npmjs.org
plugin_config: {}
