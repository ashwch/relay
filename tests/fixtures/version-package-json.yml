api_version: 1
product_name: Example Package
release_profile: npm-package
release_mode: framework-managed
provider_plugin: builtin:generic-env
profile_plugin: builtin:npm-package
tool_plugin: null
artifact_publishers:
  - plugin: builtin:npm-registry-verify
notifiers: []
metadata_enrichers: []
plugin_allowlist: []
allow_local_plugins: false
stable_branches:
  - main
version_source:
  type: file
  format: json
  path: tests/fixtures/version-package-json/package.json
  key_path:
    - version
tag_template: v{version}
notes_source:
  type: static
package:
  name: '@example/component-library'
  registry_url: https://registry.npmjs.org
plugin_config: {}
